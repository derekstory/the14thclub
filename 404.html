<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lost ball — The 14th Club</title>
<link rel="icon" type="image/png" sizes="256x256" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<style>
  :root{
    --ink:#0A1A10; --cream:#F2EFE6; --cream-dim:rgba(242,239,230,.62);
    --green-bright:#7CE08A; --gold:#F5C518;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:
      radial-gradient(1000px 460px at 50% -140px, rgba(45,110,45,.35), transparent 70%),
      var(--ink);
    color:var(--cream);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px}
  .wrap{max-width:440px}
  img.crest{width:132px; height:auto; margin:0 auto 26px; display:block;
    filter:drop-shadow(0 10px 26px rgba(0,0,0,.4))}
  h1{font-size:64px; font-weight:900; letter-spacing:-1px; line-height:1}
  .sub{margin-top:10px; font-size:20px; font-weight:600; color:var(--green-bright)}
  p{margin-top:16px; color:var(--cream-dim); font-size:16px; line-height:1.6}
  a.home{display:inline-block; margin-top:30px; background:var(--gold); color:#173118;
    font-weight:800; font-size:16px; padding:13px 30px; border-radius:100px; text-decoration:none}
  a.home:hover{filter:brightness(1.06)}
</style>
</head>
<body>
  <div class="wrap">
    <img class="crest" src="/icon.png" alt="The 14th Club crest">
    <h1>404</h1>
    <p class="sub">That shot went out of bounds.</p>
    <p>The page you're looking for isn't on the course. Let's get you back to the tee.</p>
    <a class="home" href="/">Back to the clubhouse</a>
  </div>
</body>
</html>
